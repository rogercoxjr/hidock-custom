name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  # Python Desktop Application Tests
  test-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.8, 3.9, '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libusb-1.0-0-dev

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install libusb

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd apps/desktop && pip install -e ".[dev]"

    - name: Lint with flake8
      working-directory: apps/desktop
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Format check with black
      working-directory: apps/desktop
      run: |
        black --check --diff .

    - name: Type check with mypy
      working-directory: apps/desktop
      run: |
        mypy . --ignore-missing-imports

    - name: Test with pytest
      working-directory: apps/desktop
      run: |
        python -m pytest tests/ --cov=. --cov-report=xml

    - name: Gate 4 Part-2 — per-module 80% on critical mockable allowlist
      working-directory: apps/desktop
      run: |
        set -e
        modules="file_operations_manager storage_management audio_metadata_db device_interface hta_converter calendar_cache_manager calendar_filter_engine gemini_models oauth2_pkce oauth2_token_manager config_and_logger"
        fail=0
        for m in $modules; do
          if python -m coverage report --include=src/$m.py --fail-under=80 >/dev/null 2>&1; then
            echo "PASS  $m >= 80%"
          else
            echo "FAIL  $m < 80%"
            fail=1
          fi
        done
        exit $fail

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./apps/desktop/coverage.xml
        flags: desktop
        name: desktop-${{ matrix.os }}-${{ matrix.python-version }}

  # Web Application Tests
  test-web:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json

    - name: Install dependencies
      working-directory: ./apps/web
      run: npm ci

    - name: Lint
      working-directory: ./apps/web
      run: npm run lint || true

    - name: Type check
      working-directory: ./apps/web
      run: npx tsc --noEmit

    - name: Run tests
      working-directory: ./apps/web
      run: npm run test:coverage

    - name: Build
      working-directory: ./apps/web
      run: npm run build

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./apps/web/coverage/coverage-final.json
        flags: web
        name: web-node-${{ matrix.node-version }}

  # Electron App (Hosted Knowledge Hub) — server + renderer gate
  test-electron:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/electron
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: apps/electron/package-lock.json

    - name: Install dependencies (skip Electron-ABI postinstall)
      # package.json's postinstall runs `electron-builder install-app-deps`, which rebuilds
      # native modules against Electron's Node ABI. The suite runs under plain Node (Vitest),
      # so skip that and rebuild the must-have native deps for THIS runner's Node ABI below.
      run: npm ci --ignore-scripts

    - name: Rebuild native modules for the runner's Node ABI
      run: npm rebuild better-sqlite3 sodium-native

    - name: Typecheck (node + web tsconfigs)
      run: npm run typecheck

    - name: Lint
      run: npm run lint

    - name: Test — unit + contract + integration + hosted-invariant guards
      run: npx vitest run

    - name: Server bundle + electron-boot-path audit (no `electron` on the boot graph)
      run: npm run build:server

    - name: Build SPA
      run: npm run build

  # Security Scanning
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Python security scan
      uses: pypa/gh-action-pip-audit@v1.0.8
      with:
        inputs: apps/desktop/

    - name: Run npm audit
      working-directory: ./apps/web
      run: npm audit --audit-level=moderate

  # Code Quality
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd apps/desktop && pip install -e ".[dev]"

    - name: Run pylint
      working-directory: ./apps/desktop
      run: |
        pylint --exit-zero --output-format=json --reports=y . > pylint-report.json || true

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json

    - name: Install web dependencies
      working-directory: ./apps/web
      run: npm ci

    - name: Run ESLint
      working-directory: ./apps/web
      run: npx eslint . --ext .ts,.tsx --format json --output-file eslint-report.json || true

    - name: Upload code quality reports
      uses: actions/upload-artifact@v4
      with:
        name: code-quality-reports
        path: |
          pylint-report.json
          apps/web/eslint-report.json
